<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>後台管理 | 翊安地產</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #064e3b;
      --green-mid:   #16a34a;
      --green-light: #dcfce7;
      --surface:     #ffffff;
      --bg:          #f0fdf4;
      --sidebar-bg:  #052e20;
      --sidebar-w:   240px;
      --text:        #111827;
      --muted:       #6b7280;
      --border:      #e5e7eb;
      --danger:      #ef4444;
      --warning:     #f59e0b;
      --radius:      10px;
      --shadow:      0 1px 4px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      min-height: 100vh;
      position: fixed;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-logo .icon { font-size: 1.8rem; }
    .sidebar-logo .name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      margin-top: 6px;
    }
    .sidebar-logo .sub {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
    }

    .nav-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 8px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: rgba(255,255,255,0.65);
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.15s;
      margin-bottom: 2px;
      user-select: none;
    }
    .nav-item i { width: 18px; text-align: center; font-size: 0.85rem; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: var(--green-mid); color: #fff; }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .btn-logout {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(239,68,68,0.12);
      color: #fca5a5;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.22); }

    /* ── Main ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--green-dark);
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--green-mid); color: #fff; }
    .btn-primary:hover { background: #15803d; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
    .btn-outline:hover { border-color: var(--green-mid); color: var(--green-mid); }
    .btn-danger  { background: #fee2e2; color: var(--danger); }
    .btn-danger:hover { background: #fecaca; }
    .btn-sm { padding: 5px 12px; font-size: 0.78rem; }

    /* ── Content area ── */
    .content {
      padding: 28px 32px;
      flex: 1;
    }

    /* ── Section panel ── */
    .panel {
      display: none;
    }
    .panel.active { display: block; }

    .panel-header {
      margin-bottom: 22px;
    }
    .panel-header h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--green-dark);
    }
    .panel-header p {
      font-size: 0.83rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Cards & Forms ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-full { grid-column: 1 / -1; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .field input,
    .field textarea,
    .field select {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }
    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--green-mid);
    }
    .field textarea { resize: vertical; min-height: 80px; }

    /* ── List items (videos/listings) ── */
    .item-list { display: flex; flex-direction: column; gap: 12px; }

    .item-row {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .item-row:hover { border-color: #a7f3d0; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

    .item-emoji {
      font-size: 1.8rem;
      flex-shrink: 0;
      width: 44px;
      text-align: center;
    }

    .item-info { flex: 1; min-width: 0; }
    .item-title {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-meta {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .item-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge-tour    { background: #d1fae5; color: #065f46; }
    .badge-tips    { background: #fef3c7; color: #92400e; }
    .badge-market  { background: #dbeafe; color: #1e40af; }
    .badge-taipei  { background: #ede9fe; color: #5b21b6; }
    .badge-newtaipei { background: #fce7f3; color: #9d174d; }
    .badge-taoyuan { background: #ffedd5; color: #9a3412; }
    .badge-other   { background: #f1f5f9; color: #475569; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .modal-header {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 700; color: var(--green-dark); }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.2rem;
      padding: 4px 8px; border-radius: 6px;
      transition: background 0.15s;
    }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 20px 24px 24px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green-dark);
      color: #fff;
      padding: 12px 24px;
      border-radius: 99px;
      font-size: 0.88rem;
      font-weight: 600;
      z-index: 9999;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s;
      opacity: 0;
      white-space: nowrap;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Save bar ── */
    .save-bar {
      position: fixed;
      bottom: 0;
      left: var(--sidebar-w);
      right: 0;
      background: #fff;
      border-top: 1px solid var(--border);
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 80;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
    }
    .save-bar-text {
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .save-bar-text .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--warning);
    }
    .save-bar-text .dot.saved { background: var(--green-mid); }

    .content { padding-bottom: 80px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid.cols-3 { grid-template-columns: 1fr; }
      :root { --sidebar-w: 0px; }
      .sidebar { display: none; }
      .topbar { padding: 0 16px; }
      .content { padding: 20px 16px; }
      .save-bar { left: 0; padding: 12px 16px; }
    }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">🏡</div>
    <div class="name">翊安地產</div>
    <div class="sub">後台管理系統</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">內容管理</div>
    <div class="nav-item active" data-panel="profile">
      <i class="fa-solid fa-user"></i> 個人資料
    </div>
    <div class="nav-item" data-panel="contact">
      <i class="fa-solid fa-address-card"></i> 聯絡與社群
    </div>
    <div class="nav-item" data-panel="videos">
      <i class="fa-solid fa-film"></i> 精選影片
    </div>
    <div class="nav-item" data-panel="listings">
      <i class="fa-solid fa-house"></i> 超級A案物件
    </div>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" id="logoutBtn">
      <i class="fa-solid fa-right-from-bracket"></i> 登出
    </button>
  </div>
</aside>

<!-- ── Main ── -->
<div class="main">
  <header class="topbar">
    <div class="topbar-title" id="topbarTitle">個人資料</div>
    <div class="topbar-right">
      <a href="/" target="_blank" class="btn btn-outline btn-sm">
        <i class="fa-solid fa-arrow-up-right-from-square"></i> 查看前台
      </a>
    </div>
  </header>

  <div class="content">

    <!-- ── PROFILE ── -->
    <div class="panel active" id="panel-profile">
      <div class="panel-header">
        <h2><i class="fa-solid fa-user"></i> 個人資料</h2>
        <p>修改顯示在首頁的個人資訊與統計數字</p>
      </div>

      <div class="card">
        <div class="card-title"><i class="fa-solid fa-id-card"></i> 基本資訊</div>
        <div class="form-grid">
          <div class="field">
            <label>中文姓名</label>
            <input id="p_name" type="text" />
          </div>
          <div class="field">
            <label>英文名字</label>
            <input id="p_nameEn" type="text" />
          </div>
          <div class="field">
            <label>品牌公司</label>
            <input id="p_company" type="text" />
          </div>
          <div class="field">
            <label>主標語</label>
            <input id="p_tagline" type="text" />
          </div>
          <div class="field form-full">
            <label>副標語（可換行）</label>
            <textarea id="p_subtitle" rows="2"></textarea>
          </div>
          <div class="field form-full">
            <label>自我介紹</label>
            <textarea id="p_bio" rows="3"></textarea>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><i class="fa-solid fa-chart-bar"></i> 統計數字</div>
        <div class="form-grid cols-3">
          <div class="field">
            <label>粉絲追蹤數</label>
            <input id="s_fans" type="text" placeholder="例：50K+" />
          </div>
          <div class="field">
            <label>精選影片數</label>
            <input id="s_videos" type="text" placeholder="例：200+" />
          </div>
          <div class="field">
            <label>成交案例</label>
            <input id="s_deals" type="text" placeholder="例：300+" />
          </div>
          <div class="field">
            <label>房產資歷</label>
            <input id="s_years" type="text" placeholder="例：5年+" />
          </div>
        </div>
      </div>
    </div>

    <!-- ── CONTACT ── -->
    <div class="panel" id="panel-contact">
      <div class="panel-header">
        <h2><i class="fa-solid fa-address-card"></i> 聯絡方式與社群連結</h2>
        <p>修改頁尾的聯絡資訊與各平台連結</p>
      </div>

      <div class="card">
        <div class="card-title"><i class="fa-solid fa-envelope"></i> 聯絡資訊</div>
        <div class="form-grid">
          <div class="field">
            <label>Email</label>
            <input id="c_email" type="email" />
          </div>
          <div class="field">
            <label>LINE ID</label>
            <input id="c_lineId" type="text" />
          </div>
          <div class="field form-full">
            <label>服務時間</label>
            <input id="c_hours" type="text" />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><i class="fa-solid fa-share-nodes"></i> 社群連結</div>
        <div class="form-grid">
          <div class="field">
            <label><i class="fa-brands fa-youtube" style="color:#ff0000"></i> YouTube 頻道網址</label>
            <input id="c_youtube" type="url" placeholder="https://www.youtube.com/@..." />
          </div>
          <div class="field">
            <label><i class="fa-brands fa-instagram" style="color:#e1306c"></i> Instagram 網址</label>
            <input id="c_instagram" type="url" placeholder="https://www.instagram.com/..." />
          </div>
          <div class="field">
            <label><i class="fa-brands fa-facebook" style="color:#1877f2"></i> Facebook 網址</label>
            <input id="c_facebook" type="url" placeholder="https://www.facebook.com/..." />
          </div>
          <div class="field">
            <label><i class="fa-brands fa-tiktok"></i> TikTok 網址</label>
            <input id="c_tiktok" type="url" placeholder="https://www.tiktok.com/@..." />
          </div>
          <div class="field">
            <label><i class="fa-brands fa-line" style="color:#00b900"></i> LINE 連結</label>
            <input id="c_line" type="url" placeholder="https://line.me/ti/p/..." />
          </div>
        </div>
      </div>
    </div>

    <!-- ── VIDEOS ── -->
    <div class="panel" id="panel-videos">
      <div class="panel-header">
        <h2><i class="fa-solid fa-film"></i> 精選影片</h2>
        <p>新增、編輯或刪除影片卡片</p>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
        <button class="btn btn-primary" id="addVideoBtn">
          <i class="fa-solid fa-plus"></i> 新增影片
        </button>
      </div>
      <div class="item-list" id="videoList"></div>
    </div>

    <!-- ── LISTINGS ── -->
    <div class="panel" id="panel-listings">
      <div class="panel-header">
        <h2><i class="fa-solid fa-house"></i> 超級A案物件</h2>
        <p>新增、編輯或刪除物件卡片</p>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
        <button class="btn btn-primary" id="addListingBtn">
          <i class="fa-solid fa-plus"></i> 新增物件
        </button>
      </div>
      <div class="item-list" id="listingList"></div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->

<!-- Save bar -->
<div class="save-bar">
  <div class="save-bar-text" id="saveStatus">
    <div class="dot" id="saveDot"></div>
    <span id="saveStatusText">尚未儲存變更</span>
  </div>
  <button class="btn btn-primary" id="saveBtn">
    <i class="fa-solid fa-floppy-disk"></i> 儲存所有變更
  </button>
</div>

<!-- ── Video Modal ── -->
<div class="modal-overlay" id="videoModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="videoModalTitle">新增影片</h3>
      <button class="modal-close" id="videoModalClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field form-full">
          <label>影片標題</label>
          <input id="vm_title" type="text" placeholder="例：【物件開箱】..." />
        </div>
        <div class="field">
          <label>分類</label>
          <select id="vm_category">
            <option value="tour">物件開箱</option>
            <option value="tips">購屋攻略</option>
            <option value="market">市場分析</option>
          </select>
        </div>
        <div class="field">
          <label>Emoji 圖示</label>
          <input id="vm_emoji" type="text" placeholder="🏙️" />
        </div>
        <div class="field">
          <label>觀看次數</label>
          <input id="vm_views" type="text" placeholder="例：12.4萬" />
        </div>
        <div class="field">
          <label>上傳時間</label>
          <input id="vm_time" type="text" placeholder="例：3週前" />
        </div>
        <div class="field">
          <label>影片時長</label>
          <input id="vm_duration" type="text" placeholder="例：18:42" />
        </div>
        <div class="field form-full">
          <label>YouTube 影片連結</label>
          <input id="vm_youtubeUrl" type="url" placeholder="https://www.youtube.com/watch?v=..." />
        </div>
        <div class="field form-full">
          <label>影片描述</label>
          <textarea id="vm_desc" rows="3" placeholder="簡短描述影片內容..."></textarea>
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
        <button class="btn btn-outline" id="videoModalCancel">取消</button>
        <button class="btn btn-primary" id="videoModalSave">
          <i class="fa-solid fa-check"></i> 確認
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Listing Modal ── -->
<div class="modal-overlay" id="listingModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="listingModalTitle">新增物件</h3>
      <button class="modal-close" id="listingModalClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field form-full">
          <label>物件標題</label>
          <input id="lm_title" type="text" placeholder="例：信義計畫區景觀三房..." />
        </div>
        <div class="field">
          <label>區域</label>
          <select id="lm_area">
            <option value="taipei">台北</option>
            <option value="newtaipei">新北</option>
            <option value="taoyuan">桃園</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div class="field">
          <label>區域顯示名稱</label>
          <input id="lm_areaName" type="text" placeholder="例：台北信義" />
        </div>
        <div class="field">
          <label>價格</label>
          <input id="lm_price" type="text" placeholder="例：5,880" />
        </div>
        <div class="field">
          <label>價格單位</label>
          <input id="lm_unit" type="text" placeholder="例：萬" />
        </div>
        <div class="field">
          <label>坪數</label>
          <input id="lm_size" type="text" placeholder="例：35.5坪" />
        </div>
        <div class="field">
          <label>房型</label>
          <input id="lm_rooms" type="text" placeholder="例：3房2廳2衛" />
        </div>
        <div class="field">
          <label>樓層</label>
          <input id="lm_floor" type="text" placeholder="例：18F/24F" />
        </div>
        <div class="field">
          <label>Emoji 圖示</label>
          <input id="lm_emoji" type="text" placeholder="🌆" />
        </div>
        <div class="field form-full">
          <label>標籤（用逗號分隔，格式：類型:文字，可用 a/hot/new）</label>
          <input id="lm_badges" type="text" placeholder="例：a:超級A案, hot:熱門" />
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
        <button class="btn btn-outline" id="listingModalCancel">取消</button>
        <button class="btn btn-primary" id="listingModalSave">
          <i class="fa-solid fa-check"></i> 確認
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
/* ============================================================
   STATE
   ============================================================ */
let siteData = null;
let isDirty  = false;
let editVideoIdx    = null;
let editListingIdx  = null;

const TOKEN = sessionStorage.getItem("admin_token");

/* ============================================================
   BOOT — auth check + load data
   ============================================================ */
(async () => {
  if (!TOKEN) {
    window.location.href = "/admin/";
    return;
  }
  await loadData();
})();

async function loadData() {
  try {
    const res = await fetch("/api/data");
    siteData = await res.json();
    populateAll();
  } catch (e) {
    showToast("❌ 資料載入失敗：" + e.message, "danger");
  }
}

/* ============================================================
   POPULATE FORMS
   ============================================================ */
function populateAll() {
  if (!siteData) return;
  populateProfile();
  populateContact();
  renderVideoList();
  renderListingList();
}

function populateProfile() {
  const p = siteData.profile;
  setVal("p_name",    p.name);
  setVal("p_nameEn",  p.nameEn);
  setVal("p_company", p.company);
  setVal("p_tagline", p.tagline);
  setVal("p_subtitle",p.subtitle);
  setVal("p_bio",     p.bio);
  setVal("s_fans",    p.stats.fans);
  setVal("s_videos",  p.stats.videos);
  setVal("s_deals",   p.stats.deals);
  setVal("s_years",   p.stats.years);
}

function populateContact() {
  const c = siteData.contact;
  setVal("c_email",     c.email);
  setVal("c_lineId",    c.lineId);
  setVal("c_hours",     c.hours);
  setVal("c_youtube",   c.youtube);
  setVal("c_instagram", c.instagram);
  setVal("c_facebook",  c.facebook);
  setVal("c_tiktok",    c.tiktok);
  setVal("c_line",      c.line);
}

/* ── Video list ── */
function renderVideoList() {
  const list = document.getElementById("videoList");
  const catLabel = { tour: "物件開箱", tips: "購屋攻略", market: "市場分析" };
  list.innerHTML = siteData.videos.map((v, i) => `
    <div class="item-row">
      <div class="item-emoji">${v.emoji || "🎬"}</div>
      <div class="item-info">
        <div class="item-title">${v.title}</div>
        <div class="item-meta">
          <span class="badge badge-${v.category}">${catLabel[v.category] || v.category}</span>
          <span><i class="fa-solid fa-eye"></i> ${v.views}</span>
          <span><i class="fa-regular fa-clock"></i> ${v.duration}</span>
          <span>${v.time}</span>
        </div>
      </div>
      <div class="item-actions">
        <button class="btn btn-outline btn-sm" onclick="openVideoModal(${i})">
          <i class="fa-solid fa-pen"></i> 編輯
        </button>
        <button class="btn btn-danger btn-sm" onclick="deleteVideo(${i})">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
    </div>
  `).join("");
}

/* ── Listing list ── */
function renderListingList() {
  const list = document.getElementById("listingList");
  list.innerHTML = siteData.listings.map((l, i) => `
    <div class="item-row">
      <div class="item-emoji">${l.emoji || "🏠"}</div>
      <div class="item-info">
        <div class="item-title">${l.title}</div>
        <div class="item-meta">
          <span class="badge badge-${l.area}">${l.areaName}</span>
          <span><i class="fa-solid fa-tag"></i> NT$ ${l.price} ${l.unit}</span>
          <span><i class="fa-solid fa-ruler-combined"></i> ${l.size}</span>
          <span><i class="fa-solid fa-bed"></i> ${l.rooms}</span>
        </div>
      </div>
      <div class="item-actions">
        <button class="btn btn-outline btn-sm" onclick="openListingModal(${i})">
          <i class="fa-solid fa-pen"></i> 編輯
        </button>
        <button class="btn btn-danger btn-sm" onclick="deleteListing(${i})">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
    </div>
  `).join("");
}

/* ============================================================
   COLLECT FORM DATA
   ============================================================ */
function collectAll() {
  siteData.profile = {
    name:     getVal("p_name"),
    nameEn:   getVal("p_nameEn"),
    company:  getVal("p_company"),
    tagline:  getVal("p_tagline"),
    subtitle: getVal("p_subtitle"),
    bio:      getVal("p_bio"),
    stats: {
      fans:   getVal("s_fans"),
      videos: getVal("s_videos"),
      deals:  getVal("s_deals"),
      years:  getVal("s_years"),
    }
  };
  siteData.contact = {
    email:     getVal("c_email"),
    lineId:    getVal("c_lineId"),
    hours:     getVal("c_hours"),
    youtube:   getVal("c_youtube"),
    instagram: getVal("c_instagram"),
    facebook:  getVal("c_facebook"),
    tiktok:    getVal("c_tiktok"),
    line:      getVal("c_line"),
  };
}

/* ============================================================
   SAVE
   ============================================================ */
document.getElementById("saveBtn").addEventListener("click", saveData);

async function saveData() {
  collectAll();
  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';

  try {
    const res = await fetch("/api/data", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + TOKEN,
      },
      body: JSON.stringify(siteData),
    });

    if (res.status === 401) {
      showToast("⚠️ 登入逾時，請重新登入", "danger");
      sessionStorage.removeItem("admin_token");
      setTimeout(() => { window.location.href = "/admin/"; }, 1500);
      return;
    }

    if (!res.ok) throw new Error("HTTP " + res.status);

    setDirty(false);
    showToast("✅ 儲存成功！變更已更新到網站");
  } catch (e) {
    showToast("❌ 儲存失敗：" + e.message, "danger");
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> 儲存所有變更';
  }
}

/* ============================================================
   VIDEO MODAL
   ============================================================ */
document.getElementById("addVideoBtn").addEventListener("click", () => openVideoModal(null));
document.getElementById("videoModalClose").addEventListener("click", closeVideoModal);
document.getElementById("videoModalCancel").addEventListener("click", closeVideoModal);
document.getElementById("videoModalSave").addEventListener("click", saveVideoModal);

function openVideoModal(idx) {
  editVideoIdx = idx;
  const isEdit = idx !== null;
  document.getElementById("videoModalTitle").textContent = isEdit ? "編輯影片" : "新增影片";

  if (isEdit) {
    const v = siteData.videos[idx];
    setVal("vm_title",      v.title);
    setVal("vm_category",   v.category);
    setVal("vm_emoji",      v.emoji);
    setVal("vm_views",      v.views);
    setVal("vm_time",       v.time);
    setVal("vm_duration",   v.duration);
    setVal("vm_youtubeUrl", v.youtubeUrl || "");
    setVal("vm_desc",       v.desc);
  } else {
    ["vm_title","vm_emoji","vm_views","vm_time","vm_duration","vm_youtubeUrl","vm_desc"].forEach(id => setVal(id, ""));
    setVal("vm_category", "tour");
  }

  document.getElementById("videoModal").classList.add("open");
}

function closeVideoModal() {
  document.getElementById("videoModal").classList.remove("open");
  editVideoIdx = null;
}

function saveVideoModal() {
  const catMap = { tour: "物件開箱", tips: "購屋攻略", market: "市場分析" };
  const cat = getVal("vm_category");
  const v = {
    id:         editVideoIdx !== null ? siteData.videos[editVideoIdx].id : Date.now(),
    title:      getVal("vm_title"),
    category:   cat,
    emoji:      getVal("vm_emoji") || "🎬",
    views:      getVal("vm_views"),
    time:       getVal("vm_time"),
    duration:   getVal("vm_duration"),
    badgeText:  catMap[cat] || cat,
    badge:      cat,
    youtubeUrl: getVal("vm_youtubeUrl") || "https://www.youtube.com",
    desc:       getVal("vm_desc"),
    gradient:   editVideoIdx !== null
      ? siteData.videos[editVideoIdx].gradient
      : "linear-gradient(135deg, #064e3b, #065f46)",
  };

  if (!v.title) { showToast("⚠️ 請填寫影片標題", "warn"); return; }

  if (editVideoIdx !== null) {
    siteData.videos[editVideoIdx] = v;
  } else {
    siteData.videos.push(v);
  }

  renderVideoList();
  setDirty(true);
  closeVideoModal();
  showToast(editVideoIdx !== null ? "✏️ 影片已更新" : "➕ 影片已新增");
}

function deleteVideo(idx) {
  if (!confirm("確定要刪除這部影片嗎？")) return;
  siteData.videos.splice(idx, 1);
  renderVideoList();
  setDirty(true);
  showToast("🗑️ 影片已刪除");
}

/* ============================================================
   LISTING MODAL
   ============================================================ */
document.getElementById("addListingBtn").addEventListener("click", () => openListingModal(null));
document.getElementById("listingModalClose").addEventListener("click", closeListingModal);
document.getElementById("listingModalCancel").addEventListener("click", closeListingModal);
document.getElementById("listingModalSave").addEventListener("click", saveListingModal);

function openListingModal(idx) {
  editListingIdx = idx;
  const isEdit = idx !== null;
  document.getElementById("listingModalTitle").textContent = isEdit ? "編輯物件" : "新增物件";

  if (isEdit) {
    const l = siteData.listings[idx];
    setVal("lm_title",    l.title);
    setVal("lm_area",     l.area);
    setVal("lm_areaName", l.areaName);
    setVal("lm_price",    l.price);
    setVal("lm_unit",     l.unit);
    setVal("lm_size",     l.size);
    setVal("lm_rooms",    l.rooms);
    setVal("lm_floor",    l.floor);
    setVal("lm_emoji",    l.emoji);
    // Serialize badges
    const badgesStr = (l.badges || []).map(b => {
      const type = b.cls.replace("badge-","");
      return `${type}:${b.text}`;
    }).join(", ");
    setVal("lm_badges", badgesStr);
  } else {
    ["lm_title","lm_areaName","lm_price","lm_unit","lm_size","lm_rooms","lm_floor","lm_emoji","lm_badges"]
      .forEach(id => setVal(id, ""));
    setVal("lm_area", "taipei");
  }

  document.getElementById("listingModal").classList.add("open");
}

function closeListingModal() {
  document.getElementById("listingModal").classList.remove("open");
  editListingIdx = null;
}

function saveListingModal() {
  const badgesRaw = getVal("lm_badges");
  const badges = badgesRaw
    ? badgesRaw.split(",").map(s => {
        const parts = s.trim().split(":");
        const type = (parts[0] || "").trim();
        const text = (parts[1] || "").trim();
        return { cls: `badge-${type}`, text };
      }).filter(b => b.text)
    : [];

  const l = {
    id:       editListingIdx !== null ? siteData.listings[editListingIdx].id : Date.now(),
    title:    getVal("lm_title"),
    area:     getVal("lm_area"),
    areaName: getVal("lm_areaName"),
    price:    getVal("lm_price"),
    unit:     getVal("lm_unit"),
    size:     getVal("lm_size"),
    rooms:    getVal("lm_rooms"),
    floor:    getVal("lm_floor"),
    emoji:    getVal("lm_emoji") || "🏠",
    badges,
    gradient: editListingIdx !== null
      ? siteData.listings[editListingIdx].gradient
      : "linear-gradient(135deg, #0c4a2c, #15803d)",
    liked: false,
  };

  if (!l.title) { showToast("⚠️ 請填寫物件標題", "warn"); return; }

  if (editListingIdx !== null) {
    siteData.listings[editListingIdx] = l;
  } else {
    siteData.listings.push(l);
  }

  renderListingList();
  setDirty(true);
  closeListingModal();
  showToast(editListingIdx !== null ? "✏️ 物件已更新" : "➕ 物件已新增");
}

function deleteListing(idx) {
  if (!confirm("確定要刪除這個物件嗎？")) return;
  siteData.listings.splice(idx, 1);
  renderListingList();
  setDirty(true);
  showToast("🗑️ 物件已刪除");
}

/* ============================================================
   NAVIGATION
   ============================================================ */
const titleMap = {
  profile:  "個人資料",
  contact:  "聯絡與社群",
  videos:   "精選影片",
  listings: "超級A案物件",
};

document.querySelectorAll(".nav-item").forEach(item => {
  item.addEventListener("click", () => {
    const panel = item.dataset.panel;

    document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
    item.classList.add("active");

    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById("panel-" + panel).classList.add("active");

    document.getElementById("topbarTitle").textContent = titleMap[panel];
  });
});

/* ============================================================
   DIRTY STATE
   ============================================================ */
function setDirty(dirty) {
  isDirty = dirty;
  const dot  = document.getElementById("saveDot");
  const text = document.getElementById("saveStatusText");
  if (dirty) {
    dot.classList.remove("saved");
    text.textContent = "有未儲存的變更";
  } else {
    dot.classList.add("saved");
    text.textContent = "所有變更已儲存";
  }
}

// Watch all inputs for changes
document.querySelectorAll("input, textarea, select").forEach(el => {
  el.addEventListener("input", () => setDirty(true));
});

/* ============================================================
   LOGOUT
   ============================================================ */
document.getElementById("logoutBtn").addEventListener("click", () => {
  if (isDirty && !confirm("有未儲存的變更，確定要登出嗎？")) return;
  sessionStorage.removeItem("admin_token");
  window.location.href = "/admin/";
});

/* ============================================================
   UTILS
   ============================================================ */
function getVal(id) {
  const el = document.getElementById(id);
  return el ? el.value : "";
}
function setVal(id, val) {
  const el = document.getElementById(id);
  if (el) el.value = val ?? "";
}

function showToast(msg, type = "success") {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.style.background = type === "danger" ? "#ef4444" : type === "warn" ? "#f59e0b" : "var(--green-dark)";
  toast.classList.add("show");
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove("show"), 2800);
}

// Close modals on overlay click
document.querySelectorAll(".modal-overlay").forEach(overlay => {
  overlay.addEventListener("click", e => {
    if (e.target === overlay) overlay.classList.remove("open");
  });
});
</script>
</body>
</html>
